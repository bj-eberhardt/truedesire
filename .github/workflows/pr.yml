name: PR pipeline

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Check formatting
        id: prettier
        run: npm run format:check

      - name: Lint
        id: lint
        run: npm run lint

      - name: Lint server
        id: lint-server
        run: npm run server:lint

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck server
        run: npm run server:typecheck

      - name: Build Frontend
        id: build-frontend
        run: npm run build

      - name: Build Backend server
        id: build-backend
        run: npm run server:build

      - name: Backend integration tests
        id: backend-tests
        env:
          DATABASE_URL: postgres://truedesire:truedesire@localhost:55432/truedesire_server_test
          DB_SSL: "false"
          PORT: "0"
          LOG_LEVEL: silent
          REQUEST_LOGS: "false"
        run: |
          docker compose -f docker-compose.server-test.yml up -d --wait --force-recreate
          npm run server:test

      - name: Stop backend test database
        if: always()
        run: docker compose -f docker-compose.server-test.yml down -v

      - name: Upload backend test results
        id: backend-test-results-artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: ci-reports/backend/server-tests.json
          if-no-files-found: warn

      - name: E2E tests
        id: e2e
        run: npm run test:e2e:docker

      - name: Upload Playwright report
        id: playwright-report-artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn

      - name: Create PR comment body
        id: comment-body
        if: always()
        env:
          FRONTEND_BUILD_OUTCOME: ${{ steps.build-frontend.outcome }}
          BACKEND_BUILD_OUTCOME: ${{ steps.build-backend.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          LINT_SERVER_OUTCOME: ${{ steps.lint-server.outcome }}
          BACKEND_TESTS_OUTCOME: ${{ steps.backend-tests.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          PRETTIER_OUTCOME: ${{ steps.prettier.outcome }}
          BACKEND_TEST_RESULTS_URL: ${{ steps.backend-test-results-artifact.outputs.artifact-url }}
          PLAYWRIGHT_REPORT_URL: ${{ steps.playwright-report-artifact.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/pr-ci-comment.mjs > pr-ci-comment.md

      - name: Replace PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- pr-ci-comment -->';
            const body = fs.readFileSync('pr-ci-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body?.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

      - name: Fail on unsuccessful checks
        if: >-
          steps.build-frontend.outcome != 'success' ||
          steps.build-backend.outcome != 'success' ||
          steps.lint.outcome != 'success' ||
          steps.lint-server.outcome != 'success' ||
          steps.backend-tests.outcome != 'success' ||
          steps.prettier.outcome != 'success' ||
          steps.e2e.outcome != 'success'
        run: exit 1
