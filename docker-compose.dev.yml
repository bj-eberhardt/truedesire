services:
  backend:
    image: node:24-bookworm-slim
    working_dir: /app
    command: >
      sh -c "npm install &&
      npm run server:build &&
      (npx tsc -p server/tsconfig.json --watch --preserveWatchOutput &) &&
      node --watch server/dist/server.js"
    environment:
      PORT: "3001"
      LOG_LEVEL: "debug"
      REQUEST_LOGS: "true"
      TSC_WATCHFILE: UsePollingInterval
      TSC_WATCHDIRECTORY: UsePollingInterval
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules

  frontend:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
