services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: truedesire
      POSTGRES_PASSWORD: truedesire
      POSTGRES_DB: truedesire
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truedesire -d truedesire"]
      interval: 2s
      timeout: 5s
      retries: 30

  backend:
    image: node:24-bookworm-slim
    working_dir: /app/server
    command: >
      sh -c "npm install &&
      npm run build &&
      (npm run watch &) &&
      npm run dev"
    environment:
      PORT: "3001"
      LOG_LEVEL: "debug"
      REQUEST_LOGS: "true"
      DATABASE_URL: postgres://truedesire:truedesire@postgres:5432/truedesire
      TSC_WATCHFILE: UsePollingInterval
      TSC_WATCHDIRECTORY: UsePollingInterval
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app/server
      - backend_node_modules:/app/server/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_dev_data:
  backend_node_modules:
  frontend_node_modules:
