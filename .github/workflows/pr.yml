name: PR pipeline

on:
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        id: prettier
        run: npm run format:check

      - name: Lint
        id: lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Frontend
        id: build-frontend
        run: npm run build

      - name: Build Backend server
        id: build-backend
        run: npm run server:build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        id: e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        id: playwright-report-artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn

      - name: Create PR comment body
        id: comment-body
        if: always()
        env:
          FRONTEND_BUILD_OUTCOME: ${{ steps.build-frontend.outcome }}
          BACKEND_BUILD_OUTCOME: ${{ steps.build-backend.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          PLAYWRIGHT_REPORT_URL: ${{ steps.playwright-report-artifact.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node ./github/workflows/pr-ci-comment.mjs > pr-ci-comment.md

      - name: Replace PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- pr-ci-comment -->';
            const body = fs.readFileSync('pr-ci-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body?.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

      - name: Fail on unsuccessful checks
        if: >-
          steps.frontend-build.outcome != 'success' ||
          steps.backend-build.outcome != 'success' ||
          steps.lint.outcome != 'success' ||
          steps.prettier.outcome != 'success' ||
          steps.e2e.outcome != 'success'
        run: exit 1
