services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-truedesire}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-truedesire}"
      POSTGRES_DB: "${POSTGRES_DB:-truedesire}"
    volumes:
      - truedesire_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-truedesire} -d ${POSTGRES_DB:-truedesire}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: beberhardt/truedesire:${TRUEDESIRE_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: "${PORT:-3001}"
      DATABASE_URL: "postgres://${POSTGRES_USER:-truedesire}:${POSTGRES_PASSWORD:-truedesire}@postgres:5432/${POSTGRES_DB:-truedesire}"
      STATIC_DIR: /app/dist
    ports:
      - target: 3001
        published: "${PUBLISHED_PORT:-3001}"
        protocol: tcp
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3001/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  truedesire_postgres_data:
