name: Master Build

on:
  push:
    branches: [master]

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Read package version
        id: package
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build production image
        run: docker build -f Dockerfile.prod -t beberhardt/truedesire:${{ steps.package.outputs.version }} -t beberhardt/truedesire:latest .

      - name: Smoke test production image
        shell: bash
        run: |
          docker run -d --rm --name truedesire-smoke -p 3001:3001 beberhardt/truedesire:${{ steps.package.outputs.version }}
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/health; then
              docker stop truedesire-smoke
              exit 0
            fi
            sleep 1
          done
          docker logs truedesire-smoke
          docker stop truedesire-smoke || true
          exit 1

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push production image
        run: |
          docker push beberhardt/truedesire:${{ steps.package.outputs.version }}
          docker push beberhardt/truedesire:latest
