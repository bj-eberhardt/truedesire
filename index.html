<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#e11d48" />
    <meta
      name="description"
      content="TrueDesire ist ein privates Paarspiel für ehrliche Fragen, lokale Schlüssel und sichtbare Matches."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="TrueDesire" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>TrueDesire</title>
    <style>
      #boot-fallback {
        --boot-bg: #fff7fa;
        --boot-text: #2a141a;
        --boot-muted: #73515b;
        --boot-accent: #e11d48;
        --boot-accent-2: #fb7185;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background:
          radial-gradient(700px 420px at 12% -10%, color-mix(in oklab, var(--boot-accent) 16%, transparent), transparent 58%),
          radial-gradient(600px 380px at 96% 0%, color-mix(in oklab, var(--boot-accent-2) 13%, transparent), transparent 58%),
          var(--boot-bg);
        color: var(--boot-text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #boot-fallback .boot-header {
        display: flex;
        align-items: center;
        padding: 12px 14px;
        border-bottom: 1px solid color-mix(in oklab, var(--boot-accent) 20%, #ead2d9);
        background: color-mix(in oklab, var(--boot-bg) 82%, transparent);
      }
      #boot-fallback .boot-brand {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: color-mix(in oklab, var(--boot-accent) 78%, var(--boot-text));
      }
      #boot-fallback .boot-logo {
        width: 30px;
        height: 30px;
      }
      #boot-fallback .boot-brand-text {
        display: grid;
        gap: 1px;
        line-height: 1;
      }
      #boot-fallback .boot-brand-title {
        font-family: "Segoe Script", "Brush Script MT", cursive;
        font-size: 19px;
        font-weight: 600;
      }
      #boot-fallback .boot-brand-subtitle {
        font-size: 10px;
        font-weight: 650;
        color: var(--boot-muted);
      }
      #boot-fallback .boot-main {
        flex: 1;
        display: grid;
        place-items: start center;
        padding: 14px;
      }
      #boot-fallback .boot-card {
        width: min(620px, 100%);
        margin-top: clamp(42px, 10vh, 96px);
        padding: clamp(24px, 6vw, 42px) clamp(18px, 5vw, 34px);
        display: grid;
        justify-items: center;
        gap: 24px;
        text-align: center;
        border: 1px solid color-mix(in oklab, var(--boot-accent) 18%, #ead2d9);
        border-radius: 18px;
        background: color-mix(in oklab, var(--boot-bg) 92%, transparent);
      }
      #boot-fallback .boot-kicker {
        margin: 0;
        font-family: "Segoe Script", "Brush Script MT", cursive;
        font-size: 1.1rem;
        color: color-mix(in oklab, var(--boot-accent) 78%, var(--boot-text));
      }
      #boot-fallback h1 {
        margin: 0;
        font-size: clamp(1.45rem, 4vw, 2rem);
      }
      #boot-fallback p {
        margin: 0;
        color: var(--boot-muted);
      }
      #boot-fallback .boot-loader {
        position: relative;
        width: min(420px, 100%);
        height: 34px;
        overflow: hidden;
        border-radius: 999px;
      }
      #boot-fallback .boot-loader span {
        position: absolute;
        inset: 50% 0 auto;
        height: 8px;
        border-radius: 999px;
        transform: translateY(-50%);
      }
      #boot-fallback .boot-loader-rail {
        border: 1px solid color-mix(in oklab, var(--boot-accent) 22%, #ead2d9);
        background: color-mix(in oklab, var(--boot-bg) 74%, var(--boot-accent) 8%);
      }
      #boot-fallback .boot-loader-fill {
        width: 100%;
        transform: translate(-100%, -50%);
        background: linear-gradient(90deg, var(--boot-accent), var(--boot-accent-2));
        animation: boot-fallback-fill 1.2s linear forwards;
      }
      #boot-fallback .boot-loader-vine {
        width: 46%;
        background: linear-gradient(90deg, transparent, var(--boot-accent), var(--boot-accent-2), transparent);
        animation:
          boot-fallback-vine 1.55s ease-in-out infinite alternate,
          boot-fallback-vine-fade 1.2s step-end forwards;
      }
      @keyframes boot-fallback-fill {
        to {
          transform: translate(0, -50%);
        }
      }
      @keyframes boot-fallback-vine {
        from {
          transform: translate(-8%, -50%);
        }
        to {
          transform: translate(126%, -50%);
        }
      }
      @keyframes boot-fallback-vine-fade {
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-fallback">
      <header class="boot-header">
        <div class="boot-brand" aria-label="TrueDesire">
          <svg class="boot-logo" viewBox="0 0 64 64" aria-hidden="true">
            <path
              d="M20 12c5 0 9 3 12 8 3-5 7-8 12-8 9 0 16 7 16 17 0 15-22 27-28 30C26 56 4 44 4 29 4 19 11 12 20 12Z"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="5"
            ></path>
            <path
              d="M20 31l8 8 17-19"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="5"
            ></path>
          </svg>
          <span class="boot-brand-text">
            <span class="boot-brand-title">TrueDesire</span>
            <span class="boot-brand-subtitle">Wahre Wünsche</span>
          </span>
        </div>
      </header>
      <main class="boot-main">
        <section class="boot-card" aria-live="polite">
          <div>
            <p class="boot-kicker">TrueDesire</p>
            <h1>Seite wird geladen</h1>
          </div>
          <p>Bitte kurz warten. Wir bereiten die Kontoprüfung vor.</p>
          <div class="boot-loader" role="progressbar" aria-label="Seite wird geladen">
            <span class="boot-loader-rail"></span>
            <span class="boot-loader-fill"></span>
            <span class="boot-loader-vine"></span>
          </div>
        </section>
      </main>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
