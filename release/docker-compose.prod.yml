services:
  app:
    image: beberhardt/truedesire:${TRUEDESIRE_TAG:-latest}
    build:
      context: ..
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: "${PORT:-3001}"
      DATA_DIR: /app/server/data
      SYSTEM_QUESTIONS_FILE: /app/server/default-data/system-questions.json
      STATIC_DIR: /app/dist
    ports:
      - target: 3001
        published: "${PUBLISHED_PORT:-3001}"
        protocol: tcp
    volumes:
      - truedesire_data:/app/server/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3001/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  truedesire_data:
