services:
  postgres-e2e:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: truedesire
      POSTGRES_PASSWORD: truedesire
      POSTGRES_DB: truedesire_e2e
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truedesire -d truedesire_e2e"]
      interval: 2s
      timeout: 5s
      retries: 30

  app-e2e:
    build:
      context: .
      dockerfile: Dockerfile.prod
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgres://truedesire:truedesire@postgres-e2e:5432/truedesire_e2e
      STATIC_DIR: /app/dist
      LOG_LEVEL: warn
      REQUEST_LOGS: "false"
      WEEKLY_LIMIT_DEFAULT: "15"
      PAIRING_LIMIT_USER_PER_MIN: "1000"
      PAIRING_LIMIT_USER_PER_HOUR: "1000"
      PAIRING_LIMIT_IP_PER_MIN: "1000"
      PAIRING_LIMIT_IP_PER_HOUR: "1000"
    ports:
      - "3101:3001"
      - "9323:9323"
    depends_on:
      postgres-e2e:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3001/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  playwright-e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /app
    command: npx playwright test
    environment:
      BASE_URL: http://localhost:3001
      CI: "1"
    volumes:
      - .:/app
    network_mode: "service:app-e2e"
    depends_on:
      app-e2e:
        condition: service_healthy

  playwright-e2e-ui:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /app
    command: npx playwright test --ui --ui-host=0.0.0.0 --ui-port=9323
    profiles:
      - ui
    environment:
      BASE_URL: http://localhost:3001
    volumes:
      - .:/app
    network_mode: "service:app-e2e"
    depends_on:
      app-e2e:
        condition: service_healthy
